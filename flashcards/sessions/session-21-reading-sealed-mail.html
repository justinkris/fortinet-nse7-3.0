<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Session 21 Flashcards — Reading Sealed Mail</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#faf5e9; --surface:#fffdf5; --surface-2:#f5eed9;
  --border:#d4c89a; --border-dim:#ebe1c2;
  --text:#0a1838; --text-soft:#1e2f5a; --text-muted:#6b7794;
  --blue:#1e40af; --blue-vivid:#2563eb; --blue-light:#eff4fc; --blue-border:#b8cce8;
  --ink-dark:#0d1a3a; --ink-accent:#9bb8e6;
  --green:#1a7c4a; --green-light:#dff0e1; --green-border:#a7d8b0;
  --amber:#b45309; --amber-light:#fcf2c3; --amber-border:#f3d68a;
  --plum:#7c1a5f; --plum-light:#f7e5f0; --plum-border:#d8a7c5;
}
*,*::before,*::after { box-sizing: border-box; margin:0; padding:0; }
html, body { min-height: 100vh; }
body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
}
.wrap { max-width: 1120px; margin: 0 auto; padding: 40px 28px 80px; }
.crumb {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 28px;
}
.crumb a { color: var(--text-muted); text-decoration: none; border-bottom: 1px solid transparent; }
.crumb a:hover { border-bottom-color: var(--text-muted); }
header { margin-bottom: 36px; }
.eyebrow {
  display: inline-block;
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--blue);
  background: var(--blue-light);
  padding: 5px 12px;
  border-radius: 999px;
  font-weight: 700;
  margin-bottom: 14px;
  border: 1px solid var(--blue-border);
}
h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 44px;
  line-height: 1.1;
  font-weight: 700;
  margin: 0 0 10px;
}
.lede {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 19px;
  color: var(--text-muted);
  font-style: italic;
  max-width: 640px;
}

.deck-meta {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 6px;
}
.stage {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
}
.progress {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.card-scene {
  perspective: 1600px;
  width: 100%;
  max-width: 720px;
  aspect-ratio: 3 / 2;
}
.card-flip {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.25, 1.1);
  transform-style: preserve-3d;
  cursor: pointer;
}
.card-flip.flipped { transform: rotateY(180deg); }
.face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 20px;
  padding: 48px 52px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: 0 12px 32px -18px rgba(10, 24, 56, 0.28);
  overflow-y: auto;
}
.face-front {
  background: var(--surface);
  color: var(--text);
}
.face-back {
  background: linear-gradient(135deg, var(--blue-light) 0%, var(--surface) 100%);
  color: var(--text);
  transform: rotateY(180deg);
  border-color: var(--blue-border);
}
.face-label {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 20px;
  font-weight: 700;
}
.face-back .face-label { color: var(--green); }
.face-text {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  line-height: 1.35;
  font-weight: 500;
  max-width: 560px;
}
.face-back .face-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--text-soft);
}
.hint {
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 24px;
}
.controls {
  display: flex;
  gap: 12px;
  margin-top: 6px;
}
.btn {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 12px 22px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: transform .12s ease, border-color .12s ease, background .12s ease;
}
.btn:hover:not(:disabled) {
  border-color: var(--blue);
  color: var(--blue);
  transform: translateY(-1px);
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary {
  background: var(--blue);
  color: #fbf7ec;
  border-color: var(--blue);
}
.btn-primary:hover:not(:disabled) {
  background: var(--blue-vivid);
  color: #fbf7ec;
  border-color: var(--blue-vivid);
}
.empty {
  margin-top: 40px;
  padding: 40px;
  border: 1px dashed var(--border);
  border-radius: 14px;
  background: var(--surface-2);
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--text-muted);
  font-style: italic;
  text-align: center;
}
@media (max-width: 640px) {
  h1 { font-size: 32px; }
  .face { padding: 32px 24px; }
  .face-text { font-size: 20px; }
  .face-back .face-text { font-size: 18px; }
  .card-scene { aspect-ratio: 4 / 5; }
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="crumb"><a href="../../../">Home</a> › <a href="../../">Flashcards</a> › <a href="../">Sessions</a> › Session 21</div>
    <header>
      <span class="eyebrow">Session 21 · 20 cards</span>
      <h1>Reading Sealed Mail</h1>
      <p class="lede">Click the card to flip. Use the buttons or ← / → keys to navigate.</p>
    </header>

    <div class="stage" id="stage">
      <div class="progress" id="progress">Card 1 of 20</div>

      <div class="card-scene">
        <div class="card-flip" id="cardFlip" tabindex="0" role="button" aria-label="Flip card">
          <div class="face face-front">
            <div class="face-label">Question</div>
            <div class="face-text" id="qText"></div>
            <div class="hint">Click to reveal answer</div>
          </div>
          <div class="face face-back">
            <div class="face-label">Answer</div>
            <div class="face-text" id="aText"></div>
            <div class="hint">Click to hide</div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="btn" id="prevBtn">← Prev</button>
        <button class="btn" id="flipBtn">Flip</button>
        <button class="btn" id="shuffleBtn">Shuffle</button>
        <button class="btn btn-primary" id="nextBtn">Next →</button>
      </div>
    </div>
  </div>

<script>
const CARDS = [{"q": "After enabling full inspection, every site for every user shows cert warnings. Cause?", "a": "Inspection CA not in client trusted root stores."}, {"q": "The single evidence artefact that confirms it?", "a": "Presented certificate's issuer field = your FortiGate CA (just issued)."}, {"q": "Fall back vs roll back?", "a": "Fall back = retreat to certificate inspection (still works, no client trust needed). Roll back = disable everything (wrong)."}, {"q": "What does exempt traffic receive?", "a": "No inspection of ANY depth — FortiGate exits the conversation."}, {"q": "Three reasons banking stays exempt permanently?", "a": "Compliance/data custody; refusing the capability (admin protection); certificate pinning."}, {"q": "Where does a certificate pin live?", "a": "Inside the client app, compiled-in. Not on the server."}, {"q": "CA pushed and OS-trusted; browser works; banking app fails. Why?", "a": "Certificate pinning — app validates the exact cert/key, ignores the trust store."}, {"q": "Which cert protects an inbound-facing SSL server?", "a": "The server's REAL certificate + private key (Protecting SSL Server, server-cert-mode replace)."}, {"q": "Which profile scope for outbound full inspection?", "a": "Multiple Clients Connecting to Multiple Servers."}, {"q": "Why does inbound full inspection cause zero client pain?", "a": "Clients see the genuine certificate — nothing is forged; even pinned clients validate successfully."}, {"q": "SMTPS on port 10587 evades a full-inspection proxy policy. Why?", "a": "Proxy dispatches by destination port before decryption; 10587 isn't mapped, so no inspector ever claims the session."}, {"q": "Three preconditions for protocol port mapping?", "a": "Full SSL inspection + Multiple Clients Connecting to Multiple Servers + proxy-based inspection mode."}, {"q": "Does the 10587 trick work against a flow-based policy?", "a": "NO — flow inspects all ports regardless; mapping is irrelevant."}, {"q": "Where do you configure min-allowed-ssl-version?", "a": "CLI only (config firewall ssl-ssh-profile > config https)."}, {"q": "Which protocols support version control besides HTTPS?", "a": "SMTPS, POP3S, IMAPS, FTPS."}, {"q": "min = TLS 1.2; server offers 1.1 and 1.2. Result?", "a": "ALLOWED — session negotiates 1.2, meeting the minimum."}, {"q": "Why didn't falling back to cert-inspection fix the TLS 1.0 scanners?", "a": "Version control blocks at the handshake, before any certificate is exchanged."}, {"q": "Right response to TLS 1.0-only legacy devices?", "a": "Keep the global minimum; scoped exception policy pinned at both ends (source subnet -> single destination), logged, with an expiry/ replacement date."}, {"q": "SAN vs SNI, count-decoded?", "a": "SAN = Single cert, All the Names (one cert, many names, wildcards OK). SNI = client names the host so the server SELECTS among MANY certs."}, {"q": "HTTPS-attack protection under certificate inspection?", "a": "LIMITED — blocks bad/invalid certs and known-bad SNI destinations, standalone. Not \"No\"; not conditional on IPS. ===================================================================== PODCAST PROMPT — \"The Packet Path\", Episode 21 ===================================================================== Generate a 12–15 minute podcast episode of \"The Packet Path\", an engaging, story-driven networking show. Warm, wry narrator; light sound- design cues welcome. EPISODE TITLE: \"Reading Sealed Mail\" STORY: At fintech company LoFinance (logo: stacks of money frozen in an ice cube), the team enabled TLS full inspection at 9:00 AM sharp — with one step skipped. The FortiGate's signing CA was never pushed to the client machines. By 9:04 the banking portal is red-screening, trader Marcus is physically running through the office with $400,000 of settlements clearing at 10:00, help-desk hero Riley's queue hits 51, security lead Cipher is telling users \"this is expected behaviour\" (true, unconsoling), and eager Junior wants to roll the whole thing back. Señor — the sombrero-wearing senior engineer — instead coaches the intermediate engineer to read the SYMPTOM: every site, every user, every browser = the clients don't trust the forger. The evidence is one click away: the certificate's issuer field says LoFinance-FGT-CA, issued four minutes ago. TEACH, THROUGH THE STORY: 1. Full inspection = an authorised man-in-the-middle. It forges server certificates with the FortiGate's CA — so that CA must live in every client's trusted root store BEFORE go-live. \"The order of operations IS the deployment plan.\" 2. Fall back, don't roll back: retreat to certificate inspection (reads the envelope, needs no client trust) while the CA pushes out. 3. Exemptions: banking, health, and privacy traffic stays sealed FOREVER — for compliance, because admins should refuse the very capability of reading it, and because of certificate pinning. Explain pinning with the wax-seal analogy: a browser asks \"do I trust whoever signed this?\"; a banking app asks \"is this LITERALLY the seal I was born knowing?\" Junior's line: \"Browser asks who signed it. App asks: is it literally you.\" 4. Inbound is the mirror image: LoFinance OWNS its client portal, so no forgery — load the real certificate and private key (\"Protecting SSL Server\") and suddenly Cipher's PHP injection over HTTPS, previously invisible to IPS, gets caught and dropped. The unifying idea: full inspection always requires a private key — the only question is WHOSE. 5. The sneaky bit: someone in accounting tunnels email over port 10587. Full inspection was ON — and it sailed through anyway, because the proxy engine sorts sessions into protocol pigeonholes BY PORT before opening anything. No pigeonhole labelled 10587 = never inspected. Fix: protocol port mapping. Three conditions: full inspection, multiple-clients-to-multiple-servers scope, and PROXY mode — because flow-based inspection watches every port through the window and needs no pigeonholes at all. 6. Finally: ancient warehouse scanners speaking only TLS 1.0 break against a TLS 1.2 minimum (a CLI-only setting, per protocol). The senior answer: never lower the global minimum \"just for\" one loading dock — \"just for\" being the two most expensive words in security. Build a narrow, logged, expiring exception instead: \"an exception without an expiry is not an exception; it is the new normal.\" JUNIOR'S MISTAKE: the reflex rollback and \"maybe the profile's corrupted\" — inventing a fault instead of reading evidence; and \"set the minimum back to 1.0, just for—\". END WITH THE TEASER: next morning, CFO Penny arrives holding three budget line items — web filter, application control, and something called an Internet Service Database — demanding to know why she's paying for one job three times. And a ticket appears: \"Facebook is blocked but the Facebook APP still works??\" Episode 22: \"Three Filters, One Job?\""}];
const originalOrder = CARDS.slice();
let deck = CARDS.slice();
let idx = 0;

const flipEl = document.getElementById('cardFlip');
const qEl = document.getElementById('qText');
const aEl = document.getElementById('aText');
const progress = document.getElementById('progress');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const flipBtn = document.getElementById('flipBtn');
const shuffleBtn = document.getElementById('shuffleBtn');

function render() {
  const c = deck[idx];
  qEl.textContent = c.q;
  aEl.textContent = c.a;
  flipEl.classList.remove('flipped');
  progress.textContent = `Card ${idx + 1} of ${deck.length}`;
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === deck.length - 1;
}

function flip() { flipEl.classList.toggle('flipped'); }
function next() { if (idx < deck.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
  render();
}

flipEl.addEventListener('click', flip);
flipEl.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});
flipBtn.addEventListener('click', flip);
nextBtn.addEventListener('click', next);
prevBtn.addEventListener('click', prev);
shuffleBtn.addEventListener('click', shuffle);

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'BUTTON') return;
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); flip(); }
});

render();
</script>
</body>
</html>
