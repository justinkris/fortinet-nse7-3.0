<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Session 08 Flashcards — Cowboy Hat: The Quiet Tuesday</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#faf5e9; --surface:#fffdf5; --surface-2:#f5eed9;
  --border:#d4c89a; --border-dim:#ebe1c2;
  --text:#0a1838; --text-soft:#1e2f5a; --text-muted:#6b7794;
  --blue:#1e40af; --blue-vivid:#2563eb; --blue-light:#eff4fc; --blue-border:#b8cce8;
  --ink-dark:#0d1a3a; --ink-accent:#9bb8e6;
  --green:#1a7c4a; --green-light:#dff0e1; --green-border:#a7d8b0;
  --amber:#b45309; --amber-light:#fcf2c3; --amber-border:#f3d68a;
  --plum:#7c1a5f; --plum-light:#f7e5f0; --plum-border:#d8a7c5;
}
*,*::before,*::after { box-sizing: border-box; margin:0; padding:0; }
html, body { min-height: 100vh; }
body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
}
.wrap { max-width: 1120px; margin: 0 auto; padding: 40px 28px 80px; }
.crumb {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 28px;
}
.crumb a { color: var(--text-muted); text-decoration: none; border-bottom: 1px solid transparent; }
.crumb a:hover { border-bottom-color: var(--text-muted); }
header { margin-bottom: 36px; }
.eyebrow {
  display: inline-block;
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--blue);
  background: var(--blue-light);
  padding: 5px 12px;
  border-radius: 999px;
  font-weight: 700;
  margin-bottom: 14px;
  border: 1px solid var(--blue-border);
}
h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 44px;
  line-height: 1.1;
  font-weight: 700;
  margin: 0 0 10px;
}
.lede {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 19px;
  color: var(--text-muted);
  font-style: italic;
  max-width: 640px;
}

.deck-meta {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 6px;
}
.stage {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
}
.progress {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.card-scene {
  perspective: 1600px;
  width: 100%;
  max-width: 720px;
  aspect-ratio: 3 / 2;
}
.card-flip {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.25, 1.1);
  transform-style: preserve-3d;
  cursor: pointer;
}
.card-flip.flipped { transform: rotateY(180deg); }
.face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 20px;
  padding: 48px 52px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: 0 12px 32px -18px rgba(10, 24, 56, 0.28);
  overflow-y: auto;
}
.face-front {
  background: var(--surface);
  color: var(--text);
}
.face-back {
  background: linear-gradient(135deg, var(--blue-light) 0%, var(--surface) 100%);
  color: var(--text);
  transform: rotateY(180deg);
  border-color: var(--blue-border);
}
.face-label {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 20px;
  font-weight: 700;
}
.face-back .face-label { color: var(--green); }
.face-text {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  line-height: 1.35;
  font-weight: 500;
  max-width: 560px;
}
.face-back .face-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--text-soft);
}
.hint {
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 24px;
}
.controls {
  display: flex;
  gap: 12px;
  margin-top: 6px;
}
.btn {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 12px 22px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: transform .12s ease, border-color .12s ease, background .12s ease;
}
.btn:hover:not(:disabled) {
  border-color: var(--blue);
  color: var(--blue);
  transform: translateY(-1px);
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary {
  background: var(--blue);
  color: #fbf7ec;
  border-color: var(--blue);
}
.btn-primary:hover:not(:disabled) {
  background: var(--blue-vivid);
  color: #fbf7ec;
  border-color: var(--blue-vivid);
}
.empty {
  margin-top: 40px;
  padding: 40px;
  border: 1px dashed var(--border);
  border-radius: 14px;
  background: var(--surface-2);
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--text-muted);
  font-style: italic;
  text-align: center;
}
@media (max-width: 640px) {
  h1 { font-size: 32px; }
  .face { padding: 32px 24px; }
  .face-text { font-size: 20px; }
  .face-back .face-text { font-size: 18px; }
  .card-scene { aspect-ratio: 4 / 5; }
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="crumb"><a href="../../../index.html">Home</a> › <a href="../../index.html">Flashcards</a> › <a href="../index.html">Sessions</a> › Session 08</div>
    <header>
      <span class="eyebrow">Session 08 · 13 cards</span>
      <h1>Cowboy Hat: The Quiet Tuesday</h1>
      <p class="lede">Click the card to flip. Use the buttons or ← / → keys to navigate.</p>
    </header>

    <div class="stage" id="stage">
      <div class="progress" id="progress">Card 1 of 13</div>

      <div class="card-scene">
        <div class="card-flip" id="cardFlip" tabindex="0" role="button" aria-label="Flip card">
          <div class="face face-front">
            <div class="face-label">Question</div>
            <div class="face-text" id="qText"></div>
            <div class="hint">Click to reveal answer</div>
          </div>
          <div class="face face-back">
            <div class="face-label">Answer</div>
            <div class="face-text" id="aText"></div>
            <div class="hint">Click to hide</div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="btn" id="prevBtn">← Prev</button>
        <button class="btn" id="flipBtn">Flip</button>
        <button class="btn" id="shuffleBtn">Shuffle</button>
        <button class="btn btn-primary" id="nextBtn">Next →</button>
      </div>
    </div>
  </div>

<script>
const CARDS = [{"q": "A session shows dev=13->13 both directions and policy_id=0, with real byte/packet counters. What does this indicate?", "a": "The traffic is being switched at Layer 2 (bridged), not routed — it never reached FortiGate's policy engine."}, {"q": "What command maps a raw interface index number back to its name and reveals bridge membership?", "a": "diagnose netlink interface list — look for master=<index>."}, {"q": "What does master=13 on an interface mean in that output?", "a": "The interface has been enslaved as a member of the bridge/switch construct at interface index 13."}, {"q": "Can config system switch-interface bundle two already-tagged VLAN interfaces, and what happens if it does?", "a": "Yes — this merges them into one Layer 2 broadcast domain, defeating the VLAN segmentation between them even though the tags are still valid."}, {"q": "True/False — a genuine implicit deny always produces a session entry in diagnose sys session list.", "a": "False, typically — a fully denied packet is usually dropped before a session object is built; check the traffic log (execute log display) instead to confirm a real deny decision."}, {"q": "Where does config system vdom-property live — inside a specific VDOM's context, or somewhere else?", "a": "Global context only (config global), not inside any individual VDOM."}, {"q": "What does set session 0 mean in vdom-property?", "a": "No override set — that VDOM draws from the shared global resource pool. It does NOT mean zero sessions allowed."}, {"q": "diagnose sys session stat shows session_count=50, session_limit=50, clash=182. What does clash represent?", "a": "The count of connection attempts that were rejected because the session table was already full."}, {"q": "Why did Guest-WiFi inherit root's session limit of 50?", "a": "Its config was cloned from root's when it was originally built, and root's explicit session override came along with the clone."}, {"q": "What is the correct two-step remediation philosophy for a resource ceiling problem, per this session?", "a": "Baseline first, cap after — restore service immediately (e.g. remove the artificial cap), then measure real usage before setting a deliberate, evidence-based permanent limit."}, {"q": "Does deleting a config system switch-interface object require detaching its members first?", "a": "No — the object can be deleted directly."}, {"q": "Why is a stale session left in the table after a config fix a real problem, not just clutter?", "a": "It represents live, unauthorized, ongoing state established under the old (broken) config — it must be cleared to force re-evaluation and to actually close the exposure."}, {"q": "Could a switch-interface object built inside root VDOM ever bridge an interface belonging to the isolated Trading VDOM?", "a": "No — each VDOM is a completely separate config tree; an object in one VDOM's config cannot reference an interface name that exists only in another VDOM's namespace. ========================================================================= PODCAST PROMPT — \"The Packet Path,\" Episode 8: \"The Quiet Tuesday\" ========================================================================= Generate a podcast episode using the prompt below, ready to paste into an AI audio generator. --- You are the host of \"The Packet Path,\" a calm, curious, slightly wry technical podcast about enterprise networking told through the lens of a fictional trading firm called LoFinance. Narrate today's episode as a single host speaking directly to the listener, roughly 8-10 minutes when read aloud. Use a warm, conversational, unhurried tone — like a senior engineer telling a war story over coffee, not a lecture. STRUCTURE: 1. COLD OPEN (30-45 seconds): Set the scene. Señor's cowboy hat is on the rack again — nobody saw him touch a config, nobody ever does. Two tickets land at once: VLAN 30 can suddenly see Finance, and Guest-WiFi has gone completely, totally silent. Tease that neither fault is where anyone would think to look first. 2. TICKET ONE — THE HIDDEN DOOR (3 minutes): Walk through the discovery that a support tech's RDP session reached a Finance workstation despite a correct deny policy. Build the tension around the diagnostic moment: a session existed, was actively passing real traffic, but had policy_id=0 — meaning it was never evaluated at all. Explain, in plain spoken language (no dense jargon strings), the idea of a software switch quietly bridging two VLAN interfaces together, merging two rooms that were supposed to have a locked door between them into one open space. Use the analogy of a guarded front door with a secret basement corridor nobody remembered was there. Describe finding \"OpsBridge\" and the moment of realizing the fix wasn't to change the policy — the policy was never broken — it was to remove the bridge itself. 3. TICKET TWO — THE INHERITED CEILING (3 minutes): Shift tone slightly — this one is quieter, more of a slow-burn mystery than a \"gotcha.\" Everything checked out: the link was up, the routes were right, the policies were right. And yet, nothing moved. Build toward the discovery of the session limit — a number, 50, that had been silently copied from root's own configuration months earlier when Guest-WiFi was first built, like an old habit nobody noticed they still had. Describe the moment of confirmation: exactly 50 sessions, exactly 50 allowed, and a growing pile of rejected connection attempts stacking up at the door. Land on the lesson explicitly: fix it now, but don't guess at a permanent number — measure first. 4. JUNIOR'S MISTAKE (30-45 seconds): Note, gently and without malice, that this whole second mystery traces back to an old habit — cloning a VDOM's configuration as a shortcut instead of building it clean — and that the mistake wasn't dramatic, it was just invisible until enough time and enough guest devices had passed through to finally hit the wall. Frame this as a universal engineering lesson: the boring shortcuts are often the ones that come back the slowest, and the quietest. 5. WRAP-UP / KEY TAKEAWAYS (1 minute): Summarize, spoken naturally, the two mental models from today: (1) a policy_id of zero doesn't always mean \"denied\" — sometimes it means \"never asked at all,\" and the way to tell the difference is whether real traffic was actually flowing; (2) when every piece of configuration you know how to check comes back clean, that's not a dead end — that's a sign the problem has moved somewhere else entirely, usually into resources or state rather than config. 6. TEASER (20-30 seconds): End on an intriguing, slightly ominous note. Señor tells Penny something the listener doesn't fully hear — \"season's done, tell the board Monday\" — and Riley's reaction makes it clear this wasn't expected. Don't explain what it means. Just let it hang there, and sign off in the show's usual style, inviting the listener back for the next episode. Keep all technical explanations spoken-word natural — no bullet points, no command syntax read aloud verbatim in full (paraphrase the idea of a command rather than dictating exact CLI text), and maintain narrative momentum throughout. This is a story with a technical spine, not a technical document with a story wrapped around it. ---"}];
const originalOrder = CARDS.slice();
let deck = CARDS.slice();
let idx = 0;

const flipEl = document.getElementById('cardFlip');
const qEl = document.getElementById('qText');
const aEl = document.getElementById('aText');
const progress = document.getElementById('progress');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const flipBtn = document.getElementById('flipBtn');
const shuffleBtn = document.getElementById('shuffleBtn');

function render() {
  const c = deck[idx];
  qEl.textContent = c.q;
  aEl.textContent = c.a;
  flipEl.classList.remove('flipped');
  progress.textContent = `Card ${idx + 1} of ${deck.length}`;
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === deck.length - 1;
}

function flip() { flipEl.classList.toggle('flipped'); }
function next() { if (idx < deck.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
  render();
}

flipEl.addEventListener('click', flip);
flipEl.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});
flipBtn.addEventListener('click', flip);
nextBtn.addEventListener('click', next);
prevBtn.addEventListener('click', prev);
shuffleBtn.addEventListener('click', shuffle);

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'BUTTON') return;
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); flip(); }
});

render();
</script>
</body>
</html>
