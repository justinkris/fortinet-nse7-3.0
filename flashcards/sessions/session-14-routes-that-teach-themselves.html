<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Session 14 Flashcards — Routes That Teach Themselves</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#faf5e9; --surface:#fffdf5; --surface-2:#f5eed9;
  --border:#d4c89a; --border-dim:#ebe1c2;
  --text:#0a1838; --text-soft:#1e2f5a; --text-muted:#6b7794;
  --blue:#1e40af; --blue-vivid:#2563eb; --blue-light:#eff4fc; --blue-border:#b8cce8;
  --ink-dark:#0d1a3a; --ink-accent:#9bb8e6;
  --green:#1a7c4a; --green-light:#dff0e1; --green-border:#a7d8b0;
  --amber:#b45309; --amber-light:#fcf2c3; --amber-border:#f3d68a;
  --plum:#7c1a5f; --plum-light:#f7e5f0; --plum-border:#d8a7c5;
}
*,*::before,*::after { box-sizing: border-box; margin:0; padding:0; }
html, body { min-height: 100vh; }
body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
}
.wrap { max-width: 1120px; margin: 0 auto; padding: 40px 28px 80px; }
.crumb {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 28px;
}
.crumb a { color: var(--text-muted); text-decoration: none; border-bottom: 1px solid transparent; }
.crumb a:hover { border-bottom-color: var(--text-muted); }
header { margin-bottom: 36px; }
.eyebrow {
  display: inline-block;
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--blue);
  background: var(--blue-light);
  padding: 5px 12px;
  border-radius: 999px;
  font-weight: 700;
  margin-bottom: 14px;
  border: 1px solid var(--blue-border);
}
h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 44px;
  line-height: 1.1;
  font-weight: 700;
  margin: 0 0 10px;
}
.lede {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 19px;
  color: var(--text-muted);
  font-style: italic;
  max-width: 640px;
}

.deck-meta {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 6px;
}
.stage {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
}
.progress {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.card-scene {
  perspective: 1600px;
  width: 100%;
  max-width: 720px;
  aspect-ratio: 3 / 2;
}
.card-flip {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.25, 1.1);
  transform-style: preserve-3d;
  cursor: pointer;
}
.card-flip.flipped { transform: rotateY(180deg); }
.face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 20px;
  padding: 48px 52px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: 0 12px 32px -18px rgba(10, 24, 56, 0.28);
  overflow-y: auto;
}
.face-front {
  background: var(--surface);
  color: var(--text);
}
.face-back {
  background: linear-gradient(135deg, var(--blue-light) 0%, var(--surface) 100%);
  color: var(--text);
  transform: rotateY(180deg);
  border-color: var(--blue-border);
}
.face-label {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 20px;
  font-weight: 700;
}
.face-back .face-label { color: var(--green); }
.face-text {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  line-height: 1.35;
  font-weight: 500;
  max-width: 560px;
}
.face-back .face-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--text-soft);
}
.hint {
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 24px;
}
.controls {
  display: flex;
  gap: 12px;
  margin-top: 6px;
}
.btn {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 12px 22px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: transform .12s ease, border-color .12s ease, background .12s ease;
}
.btn:hover:not(:disabled) {
  border-color: var(--blue);
  color: var(--blue);
  transform: translateY(-1px);
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary {
  background: var(--blue);
  color: #fbf7ec;
  border-color: var(--blue);
}
.btn-primary:hover:not(:disabled) {
  background: var(--blue-vivid);
  color: #fbf7ec;
  border-color: var(--blue-vivid);
}
.empty {
  margin-top: 40px;
  padding: 40px;
  border: 1px dashed var(--border);
  border-radius: 14px;
  background: var(--surface-2);
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--text-muted);
  font-style: italic;
  text-align: center;
}
@media (max-width: 640px) {
  h1 { font-size: 32px; }
  .face { padding: 32px 24px; }
  .face-text { font-size: 20px; }
  .face-back .face-text { font-size: 18px; }
  .card-scene { aspect-ratio: 4 / 5; }
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="crumb"><a href="../../../">Home</a> › <a href="../../">Flashcards</a> › <a href="../">Sessions</a> › Session 14</div>
    <header>
      <span class="eyebrow">Session 14 · 15 cards</span>
      <h1>Routes That Teach Themselves</h1>
      <p class="lede">Click the card to flip. Use the buttons or ← / → keys to navigate.</p>
    </header>

    <div class="stage" id="stage">
      <div class="progress" id="progress">Card 1 of 15</div>

      <div class="card-scene">
        <div class="card-flip" id="cardFlip" tabindex="0" role="button" aria-label="Flip card">
          <div class="face face-front">
            <div class="face-label">Question</div>
            <div class="face-text" id="qText"></div>
            <div class="hint">Click to reveal answer</div>
          </div>
          <div class="face face-back">
            <div class="face-label">Answer</div>
            <div class="face-text" id="aText"></div>
            <div class="hint">Click to hide</div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="btn" id="prevBtn">← Prev</button>
        <button class="btn" id="flipBtn">Flip</button>
        <button class="btn" id="shuffleBtn">Shuffle</button>
        <button class="btn btn-primary" id="nextBtn">Next →</button>
      </div>
    </div>
  </div>

<script>
const CARDS = [{"q": "What does a static route fundamentally not know?", "a": "The rest of the network's topology — it never asks \"is there a better path now?\""}, {"q": "What is \"routing by rumour\"?", "a": "Distance-vector routing — routers trust secondhand summaries from neighbors; bad info can propagate undetected (Chinese whispers)."}, {"q": "What does every router in a link-state protocol maintain?", "a": "An identical copy of the raw network topology — the LSDB (Link-State Database)."}, {"q": "What algorithm does OSPF use to calculate shortest paths?", "a": "Dijkstra's algorithm."}, {"q": "Why don't identical LSDBs guarantee identical SPF trees between two routers?", "a": "Because each tree is rooted at the calculating router itself — same map, different starting point. This is expected, not disagreement."}, {"q": "How often does OSPF send full LSA refreshes?", "a": "Every 30 minutes, otherwise only on real topology change (triggered update)."}, {"q": "What are the two costs of a single flat (non-areaed) LSDB at scale?", "a": "Unbounded database size, and company-wide SPF recalculation triggered by any single topology change anywhere."}, {"q": "What does an ABR maintain for each area it's connected to?", "a": "A full, separate LSDB per connected area (not a shared or partial view)."}, {"q": "What does an ABR export across an area boundary?", "a": "A summary — a Type 3 LSA containing only a prefix and a cost, with internal topology detail deliberately discarded."}, {"q": "Why must every non-backbone area connect to Area 0.0.0.0?", "a": "Because summaries discard topology detail, making loop DETECTION impossible. OSPF instead PREVENTS the risky topology shape (direct inter-area links) structurally, via the mandatory hub rule."}, {"q": "What is the backbone area's required ID?", "a": "0.0.0.0."}, {"q": "Distinguish an ABR from an ASBR.", "a": "An ABR connects two areas that are BOTH already OSPF. An ASBR is the doorway where something NON-OSPF (static, RIP, external AS) enters OSPF via redistribution."}, {"q": "Can one router be an ABR, a backbone router, and an ASBR at the same time?", "a": "Yes — router roles are compound, not mutually exclusive. Check every definition independently."}, {"q": "Is redistribution into OSPF enabled or disabled by default?", "a": "Disabled, per protocol (bgp/connected/isis/rip/static all default disabled)."}, {"q": "What Type 1 LSA scope rule matters?", "a": "Type 1 LSAs are advertised by every router but are NOT advertised outside the area where they originate. ============================================================================ PODCAST PROMPT — \"The Packet Path\", Episode 14 ============================================================================ Generate a podcast episode for \"The Packet Path\" titled \"Routes That Teach Themselves.\" The episode should: - Open with the scene: Monday morning at LoFinance, Junior staring at a printout of 47 static routes across the fleet, having gone quiet for eleven minutes. Señor connects the moment to something the listener (student) said himself three weeks earlier during the Parramatta outage: \"I wish routes could just appear and disappear correctly on their own.\" Frame OSPF as the answer to that wish, not a cold new topic. - Explain, in a warm, conversational, story-driven voice, why static routes fail at scale — not because typing is slow, but because a static route has zero awareness of the rest of the network and can be perfectly correct and still cause an outage. Reference the Parramatta incident specifically (a route vanished, traffic nearly left the building unencrypted toward a private IP) as the concrete proof. - Introduce distance-vector routing via the \"routing by rumour\" analogy — neighbors trusting neighbors, secondhand information, a Chinese-whispers risk where bad information can propagate undetected. - Contrast this with link-state routing (OSPF): every router keeps an IDENTICAL copy of the network's raw topology (the LSDB) and independently calculates shortest paths using Dijkstra's algorithm. Explain why identical databases guarantee consistent — never contradictory — routing decisions, even though each router's shortest-path tree is rooted at a different starting point (\"same map, different starting point\"). - Explain OSPF's quiet nature: full refresh every 30 minutes, otherwise silent except when a real topology change triggers an update. - Walk through why a single flat LSDB doesn't scale as LoFinance adds Chatswood, then Brisbane, then Melbourne — unbounded size, and any single link flap anywhere forcing a company-wide recalculation. - Introduce AREAS as the fix, and the ABR's job: a full LSDB per connected area, but exporting only a SUMMARY (Type 3 LSA — prefix and cost) across boundaries, deliberately discarding internal detail. - Explain the mandatory backbone rule (Area 0.0.0.0) and WHY areas can't talk directly to each other: once detail is discarded in a summary, a router can't independently verify it isn't looking at a loop. OSPF prevents the dangerous topology shape structurally rather than trying to detect corruption after the fact. - Define the four router roles (internal, backbone, ABR, ASBR) and emphasize that a single device can hold multiple roles simultaneously — this is a real exam trap. - Include Junior's role this episode: not a technical mistake, but his narrow framing of the problem as \"too much typing\" rather than \"too little awareness\" — used by Señor as a teaching contrast against the listener's own, sharper diagnosis of the real problem. - End with a teaser for Episode 15, \"Speaking OSPF on FortiGate\": real configuration begins, Chatswood's unconfigured FortiGate is still sitting on the staging bench, and Señor promises to dictate config while asking the listener to explain WHY each line is shaped the way it is — not recall it from memory. Close on Riley denying she ever promised Penny a \"live by month-end\" date, and Señor disagreeing. - Tone: warm, curious, a little wry — this is a study companion, not a lecture. Use the analogies exactly as named (\"routing by rumour,\" \"same map, different starting point\") since these are the retrieval hooks the listener is expected to remember. - Target length: 8-12 minutes of spoken content."}];
const originalOrder = CARDS.slice();
let deck = CARDS.slice();
let idx = 0;

const flipEl = document.getElementById('cardFlip');
const qEl = document.getElementById('qText');
const aEl = document.getElementById('aText');
const progress = document.getElementById('progress');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const flipBtn = document.getElementById('flipBtn');
const shuffleBtn = document.getElementById('shuffleBtn');

function render() {
  const c = deck[idx];
  qEl.textContent = c.q;
  aEl.textContent = c.a;
  flipEl.classList.remove('flipped');
  progress.textContent = `Card ${idx + 1} of ${deck.length}`;
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === deck.length - 1;
}

function flip() { flipEl.classList.toggle('flipped'); }
function next() { if (idx < deck.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
  render();
}

flipEl.addEventListener('click', flip);
flipEl.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});
flipBtn.addEventListener('click', flip);
nextBtn.addEventListener('click', next);
prevBtn.addEventListener('click', prev);
shuffleBtn.addEventListener('click', shuffle);

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'BUTTON') return;
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); flip(); }
});

render();
</script>
</body>
</html>
