<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Session 02 Flashcards — Where the Walls Go</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#faf5e9; --surface:#fffdf5; --surface-2:#f5eed9;
  --border:#d4c89a; --border-dim:#ebe1c2;
  --text:#0a1838; --text-soft:#1e2f5a; --text-muted:#6b7794;
  --blue:#1e40af; --blue-vivid:#2563eb; --blue-light:#eff4fc; --blue-border:#b8cce8;
  --ink-dark:#0d1a3a; --ink-accent:#9bb8e6;
  --green:#1a7c4a; --green-light:#dff0e1; --green-border:#a7d8b0;
  --amber:#b45309; --amber-light:#fcf2c3; --amber-border:#f3d68a;
  --plum:#7c1a5f; --plum-light:#f7e5f0; --plum-border:#d8a7c5;
}
*,*::before,*::after { box-sizing: border-box; margin:0; padding:0; }
html, body { min-height: 100vh; }
body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
}
.wrap { max-width: 1120px; margin: 0 auto; padding: 40px 28px 80px; }
.crumb {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 28px;
}
.crumb a { color: var(--text-muted); text-decoration: none; border-bottom: 1px solid transparent; }
.crumb a:hover { border-bottom-color: var(--text-muted); }
header { margin-bottom: 36px; }
.eyebrow {
  display: inline-block;
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--blue);
  background: var(--blue-light);
  padding: 5px 12px;
  border-radius: 999px;
  font-weight: 700;
  margin-bottom: 14px;
  border: 1px solid var(--blue-border);
}
h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 44px;
  line-height: 1.1;
  font-weight: 700;
  margin: 0 0 10px;
}
.lede {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 19px;
  color: var(--text-muted);
  font-style: italic;
  max-width: 640px;
}

.deck-meta {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 6px;
}
.stage {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
}
.progress {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.card-scene {
  perspective: 1600px;
  width: 100%;
  max-width: 720px;
  aspect-ratio: 3 / 2;
}
.card-flip {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.25, 1.1);
  transform-style: preserve-3d;
  cursor: pointer;
}
.card-flip.flipped { transform: rotateY(180deg); }
.face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 20px;
  padding: 48px 52px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: 0 12px 32px -18px rgba(10, 24, 56, 0.28);
  overflow-y: auto;
}
.face-front {
  background: var(--surface);
  color: var(--text);
}
.face-back {
  background: linear-gradient(135deg, var(--blue-light) 0%, var(--surface) 100%);
  color: var(--text);
  transform: rotateY(180deg);
  border-color: var(--blue-border);
}
.face-label {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 20px;
  font-weight: 700;
}
.face-back .face-label { color: var(--green); }
.face-text {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  line-height: 1.35;
  font-weight: 500;
  max-width: 560px;
}
.face-back .face-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--text-soft);
}
.hint {
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 24px;
}
.controls {
  display: flex;
  gap: 12px;
  margin-top: 6px;
}
.btn {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 12px 22px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: transform .12s ease, border-color .12s ease, background .12s ease;
}
.btn:hover:not(:disabled) {
  border-color: var(--blue);
  color: var(--blue);
  transform: translateY(-1px);
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary {
  background: var(--blue);
  color: #fbf7ec;
  border-color: var(--blue);
}
.btn-primary:hover:not(:disabled) {
  background: var(--blue-vivid);
  color: #fbf7ec;
  border-color: var(--blue-vivid);
}
.empty {
  margin-top: 40px;
  padding: 40px;
  border: 1px dashed var(--border);
  border-radius: 14px;
  background: var(--surface-2);
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--text-muted);
  font-style: italic;
  text-align: center;
}
@media (max-width: 640px) {
  h1 { font-size: 32px; }
  .face { padding: 32px 24px; }
  .face-text { font-size: 20px; }
  .face-back .face-text { font-size: 18px; }
  .card-scene { aspect-ratio: 4 / 5; }
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="crumb"><a href="../../../index.html">Home</a> › <a href="../../index.html">Flashcards</a> › <a href="../index.html">Sessions</a> › Session 02</div>
    <header>
      <span class="eyebrow">Session 02 · 15 cards</span>
      <h1>Where the Walls Go</h1>
      <p class="lede">Click the card to flip. Use the buttons or ← / → keys to navigate.</p>
    </header>

    <div class="stage" id="stage">
      <div class="progress" id="progress">Card 1 of 15</div>

      <div class="card-scene">
        <div class="card-flip" id="cardFlip" tabindex="0" role="button" aria-label="Flip card">
          <div class="face face-front">
            <div class="face-label">Question</div>
            <div class="face-text" id="qText"></div>
            <div class="hint">Click to reveal answer</div>
          </div>
          <div class="face face-back">
            <div class="face-label">Answer</div>
            <div class="face-text" id="aText"></div>
            <div class="hint">Click to hide</div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="btn" id="prevBtn">← Prev</button>
        <button class="btn" id="flipBtn">Flip</button>
        <button class="btn" id="shuffleBtn">Shuffle</button>
        <button class="btn btn-primary" id="nextBtn">Next →</button>
      </div>
    </div>
  </div>

<script>
const CARDS = [{"q": "What threat does an edge firewall primarily fight? An internal one?", "a": "Edge: hostile content (needs deep inspection). Internal: lateral movement (needs least-privilege segmentation, low latency)."}, {"q": "DEFW — series, throughput, four core functions?", "a": "FG 30–90; up to 1 Gbps; firewall, VPN (IPsec to HQ), segmentation, integrated wireless LAN."}, {"q": "Is a DEFW designed for in-depth security analysis?", "a": "No. If a branch needs more, step up to the 100–900 midrange."}, {"q": "ISFW — series, throughput, purpose?", "a": "FG 100–900; 1–100 Gbps; network micro-segmentation with low latency, integrated W/LAN, HW SSL inspection."}, {"q": "DCFW — series, throughput, purpose?", "a": "FG 1000–7000; 10–1000 Gbps; high-speed protection of the data centre (hyperscale)."}, {"q": "DCFW's physical-design fingerprint?", "a": "Multiple physical switch links bundled into one logical interface (redundancy + high-speed transfer)."}, {"q": "NGFW — series span and throughput?", "a": "FG 100–7000 plus VM/Cloud/FWaaS; 1–40 Gbps average."}, {"q": "Why does NGFW's series span overlap all the others?", "a": "Because NGFW is a ROLE, not a hardware tier. Location + enabled features define the role."}, {"q": "You enable IPS + web filtering on a campus 600F doing segmentation. What is it now?", "a": "It is functioning as an NGFW while remaining a campus-class ISFW. Nothing was replaced."}, {"q": "Where does deep inspection happen for a backhauling branch?", "a": "Centrally at HQ, after the IPsec tunnel — on hardware built for it."}, {"q": "When would a branch need local UTM (and probably a bigger box)?", "a": "Local internet breakout, or growth beyond \"basic\" needs."}, {"q": "What is a hybrid mesh firewall scenario?", "a": "Mixed firewall models carrying distributed roles (segmentation, DC, virtual NGFW, D-NGFW) across the network — one FortiOS, one management console (FortiManager)."}, {"q": "Who usually sits in front of a DCFW, and what's the alternative?", "a": "An NGFW gateway performing content filtering/IPS for entering traffic; alternatively the DCFW faces the internet directly and segments itself with VDOMs."}, {"q": "Ratio rule of thumb inside a data centre?", "a": "East-west (server-to-server) traffic dwarfs north-south — spec for the traffic that never leaves the building."}, {"q": "Penny asks why we're buying four firewall types. One sentence.", "a": "\"We buy the right size box for each location and turn security roles on where needed — we pay for placement, not duplication.\""}];
const originalOrder = CARDS.slice();
let deck = CARDS.slice();
let idx = 0;

const flipEl = document.getElementById('cardFlip');
const qEl = document.getElementById('qText');
const aEl = document.getElementById('aText');
const progress = document.getElementById('progress');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const flipBtn = document.getElementById('flipBtn');
const shuffleBtn = document.getElementById('shuffleBtn');

function render() {
  const c = deck[idx];
  qEl.textContent = c.q;
  aEl.textContent = c.a;
  flipEl.classList.remove('flipped');
  progress.textContent = `Card ${idx + 1} of ${deck.length}`;
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === deck.length - 1;
}

function flip() { flipEl.classList.toggle('flipped'); }
function next() { if (idx < deck.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
  render();
}

flipEl.addEventListener('click', flip);
flipEl.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});
flipBtn.addEventListener('click', flip);
nextBtn.addEventListener('click', next);
prevBtn.addEventListener('click', prev);
shuffleBtn.addEventListener('click', shuffle);

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'BUTTON') return;
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); flip(); }
});

render();
</script>
</body>
</html>
