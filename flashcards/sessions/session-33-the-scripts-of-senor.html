<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Session 33 Flashcards — The Scripts of Señor</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#faf5e9; --surface:#fffdf5; --surface-2:#f5eed9;
  --border:#d4c89a; --border-dim:#ebe1c2;
  --text:#0a1838; --text-soft:#1e2f5a; --text-muted:#6b7794;
  --blue:#1e40af; --blue-vivid:#2563eb; --blue-light:#eff4fc; --blue-border:#b8cce8;
  --ink-dark:#0d1a3a; --ink-accent:#9bb8e6;
  --green:#1a7c4a; --green-light:#dff0e1; --green-border:#a7d8b0;
  --amber:#b45309; --amber-light:#fcf2c3; --amber-border:#f3d68a;
  --plum:#7c1a5f; --plum-light:#f7e5f0; --plum-border:#d8a7c5;
}
*,*::before,*::after { box-sizing: border-box; margin:0; padding:0; }
html, body { min-height: 100vh; }
body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
}
.wrap { max-width: 1120px; margin: 0 auto; padding: 40px 28px 80px; }
.crumb {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 28px;
}
.crumb a { color: var(--text-muted); text-decoration: none; border-bottom: 1px solid transparent; }
.crumb a:hover { border-bottom-color: var(--text-muted); }
header { margin-bottom: 36px; }
.eyebrow {
  display: inline-block;
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--blue);
  background: var(--blue-light);
  padding: 5px 12px;
  border-radius: 999px;
  font-weight: 700;
  margin-bottom: 14px;
  border: 1px solid var(--blue-border);
}
h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 44px;
  line-height: 1.1;
  font-weight: 700;
  margin: 0 0 10px;
}
.lede {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 19px;
  color: var(--text-muted);
  font-style: italic;
  max-width: 640px;
}

.deck-meta {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 6px;
}
.stage {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
}
.progress {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.card-scene {
  perspective: 1600px;
  width: 100%;
  max-width: 720px;
  aspect-ratio: 3 / 2;
}
.card-flip {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.25, 1.1);
  transform-style: preserve-3d;
  cursor: pointer;
}
.card-flip.flipped { transform: rotateY(180deg); }
.face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 20px;
  padding: 48px 52px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: 0 12px 32px -18px rgba(10, 24, 56, 0.28);
  overflow-y: auto;
}
.face-front {
  background: var(--surface);
  color: var(--text);
}
.face-back {
  background: linear-gradient(135deg, var(--blue-light) 0%, var(--surface) 100%);
  color: var(--text);
  transform: rotateY(180deg);
  border-color: var(--blue-border);
}
.face-label {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 20px;
  font-weight: 700;
}
.face-back .face-label { color: var(--green); }
.face-text {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  line-height: 1.35;
  font-weight: 500;
  max-width: 560px;
}
.face-back .face-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--text-soft);
}
.hint {
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 24px;
}
.controls {
  display: flex;
  gap: 12px;
  margin-top: 6px;
}
.btn {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 12px 22px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: transform .12s ease, border-color .12s ease, background .12s ease;
}
.btn:hover:not(:disabled) {
  border-color: var(--blue);
  color: var(--blue);
  transform: translateY(-1px);
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary {
  background: var(--blue);
  color: #fbf7ec;
  border-color: var(--blue);
}
.btn-primary:hover:not(:disabled) {
  background: var(--blue-vivid);
  color: #fbf7ec;
  border-color: var(--blue-vivid);
}
.empty {
  margin-top: 40px;
  padding: 40px;
  border: 1px dashed var(--border);
  border-radius: 14px;
  background: var(--surface-2);
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--text-muted);
  font-style: italic;
  text-align: center;
}
@media (max-width: 640px) {
  h1 { font-size: 32px; }
  .face { padding: 32px 24px; }
  .face-text { font-size: 20px; }
  .face-back .face-text { font-size: 18px; }
  .card-scene { aspect-ratio: 4 / 5; }
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="crumb"><a href="../../../index.html">Home</a> › <a href="../../index.html">Flashcards</a> › <a href="../index.html">Sessions</a> › Session 33</div>
    <header>
      <span class="eyebrow">Session 33 · 15 cards</span>
      <h1>The Scripts of Señor</h1>
      <p class="lede">Click the card to flip. Use the buttons or ← / → keys to navigate.</p>
    </header>

    <div class="stage" id="stage">
      <div class="progress" id="progress">Card 1 of 15</div>

      <div class="card-scene">
        <div class="card-flip" id="cardFlip" tabindex="0" role="button" aria-label="Flip card">
          <div class="face face-front">
            <div class="face-label">Question</div>
            <div class="face-text" id="qText"></div>
            <div class="hint">Click to reveal answer</div>
          </div>
          <div class="face face-back">
            <div class="face-label">Answer</div>
            <div class="face-text" id="aText"></div>
            <div class="hint">Click to hide</div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="btn" id="prevBtn">← Prev</button>
        <button class="btn" id="flipBtn">Flip</button>
        <button class="btn" id="shuffleBtn">Shuffle</button>
        <button class="btn btn-primary" id="nextBtn">Next →</button>
      </div>
    </div>
  </div>

<script>
const CARDS = [{"q": "Three script run targets?", "a": "Remote FortiGate Directly (via CLI); Device Database; Policy Package/ADOM Database."}, {"q": "What does FMG do automatically after a remote-FortiGate script?", "a": "Auto-retrieve — captures the box's config into the device DB as a new revision; status Synchronized."}, {"q": "Remote script created a firewall policy — where does it stop?", "a": "Device DB. Manual Import required to bring it into the policy package."}, {"q": "Device-DB script ran; what's the status and the fix?", "a": "Modified; Install Device Settings (or package install if policies included)."}, {"q": "Can device-DB policy changes auto-import into the policy layer?", "a": "No — never. Manual import path only."}, {"q": "Package script created address + policy — how do changes reach the FortiGate?", "a": "Install the policy package (policy layer -> device DB -> FortiGate)."}, {"q": "Which target requires NO install afterwards?", "a": "Remote FortiGate Directly — the change is already live."}, {"q": "Does auto-retrieve fire after device-DB or package scripts?", "a": "No. Its intake is the box; the box was never touched."}, {"q": "CLI script advantages?", "a": "Familiar FortiOS syntax; metadata-variable support; auditable; no new failure modes."}, {"q": "When do you need Tcl?", "a": "When the script must decide — if/else, loops, per-device branching."}, {"q": "After a package script, why avoid importing?", "a": "Import drags the device layer's view over your fresh policy-layer work; scripts wrote to the source of truth directly."}, {"q": "Reinstall Policy vs Install Policy Package — what's skipped, what's kept?", "a": "Wizard skipped (device/package already paired); PREVIEW kept. Reinstall also pushes device-DB modifications."}, {"q": "Staged device-DB changes Friday, SSH hotfix Saturday, install Monday — risk?", "a": "The install can overwrite the hotfix. Retrieve/reconcile revision history first; read the preview."}, {"q": "Guide use case for a remote script? For a device-DB script?", "a": "Remote: create/push a remote CA certificate. Device DB: custom administrator profile."}, {"q": "Cipher's law of automation?", "a": "Automation removes variance, not mistakes — wrong changes also ship before lunch. ==================================================================== PODCAST PROMPT — \"The Packet Path\", Episode 33: \"The Scripts of Señor\" ==================================================================== Generate a 10-14 minute podcast episode for the series \"The Packet Path\" — a warm, story-driven networking podcast that teaches Fortinet NSE7 Enterprise Firewall 7.6 concepts through the ongoing saga of LoFinance (a financial company whose logo is stacks of money frozen in an ice cube). Two hosts: an enthusiastic narrator and a dry, technical co-host who interjects with precision. STORY TO TELL: Señor — the eccentric senior engineer with the sombrero, the mandarin habit, and the most catastrophic desk in the southern hemisphere — arrives EARLY, puts on reading glasses nobody knew he owned, and from that disaster of a desk types a ten-line FortiManager CLI script that completes Junior's entire colour-coded week of fleet work (syslog, admin timeout, DNS) before 9:03 AM. Run target: Remote FortiGate Directly. FortiManager auto-retrieves each result into the device database — receipts in revision history, status Synchronized. Then Junior writes his own script (an admin profile so help-desk Riley stops asking for super_admin) but aims it at the DEVICE DATABASE target. Green checkmark. \"Done, try logging in.\" Riley cannot. The profile is staged in FortiManager's mirror, status Modified, undelivered — the envelope had the wrong address. TEACH, THROUGH THE STORY: 1) The three run targets and the three beats for each: where the change lands, what flips Modified, what operation delivers it (remote = live + auto-retrieve; device DB = Modified + install device settings; policy package = package Modified + install package). 2) The exception: policy changes never climb into the policy package on their own — Import is a deliberate human gate. Explain the BLAST-RADIUS reasoning: the device DB mirrors one box (safe to automate), the package is shared truth for the fleet (a human must open the gate). 3) CLI vs Tcl using the \"letter vs person\" analogy — a letter is identical for every recipient and cannot make NEW mistakes; a person (Tcl: proc, if/else, loops) can check which device it's standing on (the Melbourne box recabled to port2) and branch. 4) Cipher's line, delivered ominously: \"Automation removes VARIANCE, not mistakes.\" A wrong change also ships before lunch. 5) The memory anchors, spoken aloud: \"The run target is the address on the envelope.\" \"A green checkmark means the script ran, never that the change arrived.\" \"Reinstall skips the questions, never the confession.\" INCLUDE: Junior's mistake as the emotional centre (his deleted calendar week; his locked-out colleague); Señor's closing line (\"Your week is deleted. Do not fill it with new mistakes. Fill it with lunch.\"); a 60-second rapid recap of the three-target table. END WITH THE TEASER for Episode 34, \"Automation With Teeth\": Junior has assigned a CLI template to the ENTIRE fleet — and somewhere in a metadata variable there is a one-character typo about to rename the DMZ on every firewall at once. The whiteboard reads: \"one character. thirty firewalls. choose the character carefully.\" Fade out on Cipher whispering: \"Teeth. Wonderful.\" ==================================================================== END OF PACK · Completed Friday, 17 July 2026 ===================================================================="}];
const originalOrder = CARDS.slice();
let deck = CARDS.slice();
let idx = 0;

const flipEl = document.getElementById('cardFlip');
const qEl = document.getElementById('qText');
const aEl = document.getElementById('aText');
const progress = document.getElementById('progress');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const flipBtn = document.getElementById('flipBtn');
const shuffleBtn = document.getElementById('shuffleBtn');

function render() {
  const c = deck[idx];
  qEl.textContent = c.q;
  aEl.textContent = c.a;
  flipEl.classList.remove('flipped');
  progress.textContent = `Card ${idx + 1} of ${deck.length}`;
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === deck.length - 1;
}

function flip() { flipEl.classList.toggle('flipped'); }
function next() { if (idx < deck.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
  render();
}

flipEl.addEventListener('click', flip);
flipEl.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});
flipBtn.addEventListener('click', flip);
nextBtn.addEventListener('click', next);
prevBtn.addEventListener('click', prev);
shuffleBtn.addEventListener('click', shuffle);

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'BUTTON') return;
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); flip(); }
});

render();
</script>
</body>
