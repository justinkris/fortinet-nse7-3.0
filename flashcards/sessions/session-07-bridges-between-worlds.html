<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Session 07 Flashcards — Bridges Between Worlds</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#faf5e9; --surface:#fffdf5; --surface-2:#f5eed9;
  --border:#d4c89a; --border-dim:#ebe1c2;
  --text:#0a1838; --text-soft:#1e2f5a; --text-muted:#6b7794;
  --blue:#1e40af; --blue-vivid:#2563eb; --blue-light:#eff4fc; --blue-border:#b8cce8;
  --ink-dark:#0d1a3a; --ink-accent:#9bb8e6;
  --green:#1a7c4a; --green-light:#dff0e1; --green-border:#a7d8b0;
  --amber:#b45309; --amber-light:#fcf2c3; --amber-border:#f3d68a;
  --plum:#7c1a5f; --plum-light:#f7e5f0; --plum-border:#d8a7c5;
}
*,*::before,*::after { box-sizing: border-box; margin:0; padding:0; }
html, body { min-height: 100vh; }
body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
}
.wrap { max-width: 1120px; margin: 0 auto; padding: 40px 28px 80px; }
.crumb {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 28px;
}
.crumb a { color: var(--text-muted); text-decoration: none; border-bottom: 1px solid transparent; }
.crumb a:hover { border-bottom-color: var(--text-muted); }
header { margin-bottom: 36px; }
.eyebrow {
  display: inline-block;
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--blue);
  background: var(--blue-light);
  padding: 5px 12px;
  border-radius: 999px;
  font-weight: 700;
  margin-bottom: 14px;
  border: 1px solid var(--blue-border);
}
h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 44px;
  line-height: 1.1;
  font-weight: 700;
  margin: 0 0 10px;
}
.lede {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 19px;
  color: var(--text-muted);
  font-style: italic;
  max-width: 640px;
}

.deck-meta {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 6px;
}
.stage {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
}
.progress {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.card-scene {
  perspective: 1600px;
  width: 100%;
  max-width: 720px;
  aspect-ratio: 3 / 2;
}
.card-flip {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.25, 1.1);
  transform-style: preserve-3d;
  cursor: pointer;
}
.card-flip.flipped { transform: rotateY(180deg); }
.face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 20px;
  padding: 48px 52px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: 0 12px 32px -18px rgba(10, 24, 56, 0.28);
  overflow-y: auto;
}
.face-front {
  background: var(--surface);
  color: var(--text);
}
.face-back {
  background: linear-gradient(135deg, var(--blue-light) 0%, var(--surface) 100%);
  color: var(--text);
  transform: rotateY(180deg);
  border-color: var(--blue-border);
}
.face-label {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 20px;
  font-weight: 700;
}
.face-back .face-label { color: var(--green); }
.face-text {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  line-height: 1.35;
  font-weight: 500;
  max-width: 560px;
}
.face-back .face-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--text-soft);
}
.hint {
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 24px;
}
.controls {
  display: flex;
  gap: 12px;
  margin-top: 6px;
}
.btn {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 12px 22px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: transform .12s ease, border-color .12s ease, background .12s ease;
}
.btn:hover:not(:disabled) {
  border-color: var(--blue);
  color: var(--blue);
  transform: translateY(-1px);
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary {
  background: var(--blue);
  color: #fbf7ec;
  border-color: var(--blue);
}
.btn-primary:hover:not(:disabled) {
  background: var(--blue-vivid);
  color: #fbf7ec;
  border-color: var(--blue-vivid);
}
.empty {
  margin-top: 40px;
  padding: 40px;
  border: 1px dashed var(--border);
  border-radius: 14px;
  background: var(--surface-2);
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--text-muted);
  font-style: italic;
  text-align: center;
}
@media (max-width: 640px) {
  h1 { font-size: 32px; }
  .face { padding: 32px 24px; }
  .face-text { font-size: 20px; }
  .face-back .face-text { font-size: 18px; }
  .card-scene { aspect-ratio: 4 / 5; }
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="crumb"><a href="../../../">Home</a> › <a href="../../">Flashcards</a> › <a href="../">Sessions</a> › Session 07</div>
    <header>
      <span class="eyebrow">Session 07 · 12 cards</span>
      <h1>Bridges Between Worlds</h1>
      <p class="lede">Click the card to flip. Use the buttons or ← / → keys to navigate.</p>
    </header>

    <div class="stage" id="stage">
      <div class="progress" id="progress">Card 1 of 12</div>

      <div class="card-scene">
        <div class="card-flip" id="cardFlip" tabindex="0" role="button" aria-label="Flip card">
          <div class="face face-front">
            <div class="face-label">Question</div>
            <div class="face-text" id="qText"></div>
            <div class="hint">Click to reveal answer</div>
          </div>
          <div class="face face-back">
            <div class="face-label">Answer</div>
            <div class="face-text" id="aText"></div>
            <div class="hint">Click to hide</div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="btn" id="prevBtn">← Prev</button>
        <button class="btn" id="flipBtn">Flip</button>
        <button class="btn" id="shuffleBtn">Shuffle</button>
        <button class="btn btn-primary" id="nextBtn">Next →</button>
      </div>
    </div>
  </div>

<script>
const CARDS = [{"q": "Why use an inter-VDOM link instead of a physical cable between two VDOMs on the same FortiGate?", "a": "Avoids wasting two physical ports; the two VDOMs already share the same physical hardware."}, {"q": "How many times do you create an inter-VDOM link — once, or once per VDOM?", "a": "Once, from Global VDOM context — both VDOM assignments chosen in the same creation step."}, {"q": "A link is named \"Finance_Link.\" What are the two auto-generated interface names?", "a": "Finance_Link0 and Finance_Link1."}, {"q": "How do you determine which VDOM owns Finance_Link0 vs Finance_Link1?", "a": "Check each interface's actual VDOM assignment (config system interface or GUI interface list) — it's not a fixed/memorizable rule."}, {"q": "True or False — creating the inter-VDOM link interface pair is enough for traffic to flow between the two VDOMs.", "a": "False. You also need a route AND a policy on both sides."}, {"q": "Can one firewall policy govern traffic across two different VDOMs?", "a": "No — every VDOM maintains its own independent policy table; no policy spans two VDOMs."}, {"q": "In the packet path Guest-WiFi → root → internet, does root need a NEW route added?", "a": "No — root already has a pre-existing default route to the internet via its WAN interface; only Guest-WiFi needs a new route toward the link."}, {"q": "A route exists pointing at the link interface, but no matching policy exists. What happens to the traffic, and at which stage does it fail?", "a": "Traffic is dropped. Routing succeeds (egress interface is chosen); it fails at the policy lookup stage."}, {"q": "Does routing or policy lookup happen first on a FortiGate?", "a": "Routing decides the egress interface first; policy lookup happens after, using that determined dstintf."}, {"q": "Trading VDOM has no inter-VDOM link, no route, and no interface pointing toward it from any other VDOM. Can Guest-WiFi traffic reach Trading VDOM, even accidentally, purely through VDOM configuration?", "a": "No — there is no interface to route toward and no path exists at all. This is stronger isolation than a policy deny rule."}, {"q": "Six months from now, someone wants Trading-to-Guest connectivity for one file transfer. What's the single config artifact that must be newly built?", "a": "A new inter-VDOM link, plus its own dedicated routes and policies on both sides — the absence of a link isn't a rule that can be \"loosened.\""}, {"q": "What's the difference between internal VDOM isolation and external L2/ physical topology isolation?", "a": "Internal VDOM isolation is about link/route/interface existence inside the FortiGate's virtual firewalls. External L2/physical isolation is about actual cabling/switch topology outside the FortiGate — a completely separate risk that VDOM configuration doesn't control. ========================================================================= PODCAST PROMPT — \"The Packet Path\" (paste directly into an AI audio generator) ========================================================================= Create a podcast episode for \"The Packet Path,\" a technical study podcast for network security engineers preparing for the Fortinet NSE7 Enterprise Firewall exam. Two co-hosts, conversational and warm but technically sharp — think experienced engineers explaining a real production war story to a colleague, not a lecture. EPISODE TITLE: \"Bridges Between Worlds — Inter-VDOM Links and the Myth of the Free Cable\" STORY TO TELL: Open with the scene: a junior engineer at a financial services firm (\"LoFinance\") wants to solve a connectivity problem by buying a $340 network switch and running a physical cable between two virtual firewalls that already live inside the SAME physical box. Walk through why this instinct is understandable but wrong — he's about to burn two ports and a cable run to solve a problem that has a zero-cost, purely-configuration solution already sitting inside the device he's staring at. TECHNICAL CONCEPTS TO EXPLAIN, WITH REASONING (not just facts): 1. What an inter-VDOM link actually is — a paired virtual interface, created ONCE from a global administrative context, not something you build twice. Explain WHY it's created once (it's a single object spanning two VDOMs by design) and use the analogy of two offices on the same floor installing an internal door, instead of both offices mailing letters out to the street and back. 2. The auto-naming convention (base name + 0 / base name + 1) and WHY it exists — two interfaces literally cannot share an identical name inside one device's interface table, so FortiGate disambiguates automatically. Make clear that which side is \"0\" and which is \"1\" is not something to memorize as a fixed rule — you always verify by checking VDOM assignment. 3. The critical insight that the link alone does NOTHING — you need a route in EACH VDOM's own independent routing table, and a policy in EACH VDOM's own independent policy table, because VDOMs never share either of those tables. Walk through the full six-hop packet journey from a guest device requesting an internet address, through Guest-WiFi's routing table, its policy table, across the link, into root's pre-existing routing table, root's policy table, and out through NAT to the internet. 4. The sequencing rule that trips people up on the exam: routing ALWAYS happens before policy lookup. A route can succeed while policy still drops the traffic — explain why this produces a confusing symptom (looks like a policy bug, but a missing route can cause a nearly identical-looking failure at an earlier stage) and why a real engineer traces the flow step by step instead of guessing which layer is broken. 5. The central mental model of the whole episode: VDOMs default to being \"physically nonexistent to each other\" — NOT \"connected unless a policy blocks it.\" No inter-VDOM link means no interface means no route is even possible means no path exists at all. This is stronger than any firewall deny rule, because there's nothing present to even evaluate a policy against. Use this to explain why the Trading VDOM (holding sensitive trading floor data) stays completely safe from the new guest network — not because someone remembered to write a \"deny\" rule, but because nobody ever built a bridge there in the first place. 6. Include a \"common near-miss\" moment: a junior engineer might reach for \"maybe traffic could leak through some roundabout physical path outside the box\" when asked why one VDOM can't reach another — explain clearly why that's a DIFFERENT problem entirely (physical/L2 switch topology outside the firewall), completely separate from the internal VDOM isolation model being discussed, and why good engineers keep these two isolation boundaries mentally distinct. JUNIOR'S MISTAKE TO INCLUDE: Junior proposed running a physical cable and buying a $340 switch to connect the guest network to the internet-facing root VDOM, without realizing both virtual firewalls already live inside the same physical chassis and can be linked at zero hardware cost using a purely virtual inter-VDOM link. Frame this warmly, not as mockery — it's a completely reasonable first instinct for someone thinking in terms of physical networking, and the episode should explain why virtualized firewall thinking requires a slightly different mental model than physical network thinking. CLOSING: Wrap with the practical takeaway a working engineer should walk away with: whenever you need connectivity between two VDOMs on the same FortiGate, always reach for an inter-VDOM link with its own route and policy pair on both sides — never a physical workaround — and always verify all three layers (link, route, policy) independently on BOTH VDOMs when troubleshooting, because a failure on one side can look identical to a failure on the other. TEASER FOR NEXT EPISODE: End with an ominous, slightly playful teaser: next episode is a boss battle. Someone put on a cowboy hat, quietly broke something in the network overnight, and by morning VLAN 30 can suddenly reach finance systems it was never supposed to touch — while the guest Wi-Fi that was JUST fixed this episode can't reach anything at all, not even the root VDOM. No hints this time. Full VLANs and VDOMs review, layered faults, and the listener/engineer will have to drive the entire troubleshooting session themselves. TONE: Confident, warm, occasionally funny, respectful of the junior engineer's mistake, deeply technical but explained through story and reasoning rather than a dry list of facts. Target run time: 12-15 minutes."}];
const originalOrder = CARDS.slice();
let deck = CARDS.slice();
let idx = 0;

const flipEl = document.getElementById('cardFlip');
const qEl = document.getElementById('qText');
const aEl = document.getElementById('aText');
const progress = document.getElementById('progress');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const flipBtn = document.getElementById('flipBtn');
const shuffleBtn = document.getElementById('shuffleBtn');

function render() {
  const c = deck[idx];
  qEl.textContent = c.q;
  aEl.textContent = c.a;
  flipEl.classList.remove('flipped');
  progress.textContent = `Card ${idx + 1} of ${deck.length}`;
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === deck.length - 1;
}

function flip() { flipEl.classList.toggle('flipped'); }
function next() { if (idx < deck.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
  render();
}

flipEl.addEventListener('click', flip);
flipEl.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
});
flipBtn.addEventListener('click', flip);
nextBtn.addEventListener('click', next);
prevBtn.addEventListener('click', prev);
shuffleBtn.addEventListener('click', shuffle);

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'BUTTON') return;
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); flip(); }
});

render();
</script>
</body>
</html>
